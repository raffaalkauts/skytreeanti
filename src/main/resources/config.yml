  default_size: 50
  max_members: 10
  invite_expiry_ms: 60000
  max_spiral_search_tries: 5000
  member_limit_base: 4
  member_limit_per_level: 2
  spawner_limit_base: 16
  spawner_limit_per_level: 8
  size_upgrade_base: 50
  size_upgrade_per_level: 25
  generator_mult_base: 1.0
  generator_mult_per_level: 0.1
  level_divisor: 100
  default_block_value: 1
  block_values:
    DIRT: 1
    STONE: 1
    COBBLESTONE: 1
    GRASS_BLOCK: 1
    SAND: 1
    GRAVEL: 1
    IRON_ORE: 30
    GOLD_ORE: 50
    DIAMOND_ORE: 50
    EMERALD_ORE: 100
    LAPIS_ORE: 20
    REDSTONE_ORE: 20
    COAL_ORE: 10
    COPPER_ORE: 15
    NETHERITE_SCRAP: 200
    ANCIENT_DEBRIS: 200
    IRON_BLOCK: 90
    GOLD_BLOCK: 135
    DIAMOND_BLOCK: 450
    EMERALD_BLOCK: 900
    NETHERITE_BLOCK: 2000
    BEACON: 150
  
economy:
  use_vault: true
  currency_name: "USDT"
  starting_balance: 100.0
  
machines:
  tick_interval: 20
  cable_capacity: 100000
  cable_transfer: 1000
  durations:
    powered_spawner_seconds: 5.0
    sieve_seconds: 10.0
    barrel_seconds: 20.0
    crucible_seconds: 33.333
    cobble_gen_seconds: 5.0
    cobble_minion_seconds: 5.0
  
energy:
  flux_per_tick: 10

performance:
  data-save-interval: 6000
  island-level-interval: 12000
  island-clear-blocks-per-tick: 10000

# --- BANK & ECONOMY ---
bank:
  interest_rate_per_minute: 0.0011
  min_balance_for_interest: 10.0
  max_deposit: 1000000000000.0
  max_withdraw: 1000000000000.0
  max_transfer: 1000000000000.0
  rate_limit_per_minute: 10
  rate_limit_window_ms: 60000
  transaction_fee_percent: 0.01
  min_fee_cents: 1
  interest_calc_interval_ticks: 1200
  cents_per_unit: 100

# --- ECONOMY MANAGER (CENTRAL BANK) ---
economy_manager:
  target_m2: 50000.0
  elasticity: 0.5
  price_min_multiplier: 0.5
  price_max_multiplier: 3.0
  recalc_interval_ticks: 20
  base_interest_rate: 0.0011
  rare_items:
    elytra:
      multiplier: 20.0
    mace:
      multiplier: 10.0
    heavy_core:
      multiplier: 15.0
    nether_star:
      multiplier: 10.0
    spawner_default:
      multiplier: 8.0
    spawn_egg_default:
      multiplier: 5.0

# --- SHOP ---
shop:
