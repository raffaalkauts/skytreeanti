  SKELETON:
    unlocked: false
    cost: 5000
  CREEPER:
    unlocked: false
    cost: 7500
  ENDERMAN:
    unlocked: false
    cost: 10000
  VILLAGER:
    unlocked: false
    cost: 7500
  PIGLIN:
